<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agrio.ai</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@500&display=swap" rel="stylesheet"/>
  <style>
    :root { --green:#2d6a4f; --lime:#74c69d; --cream:#f8f5ee; --dark:#1b2e22; --text:#3a3a3a; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--cream); }

    header { position:sticky; top:0; z-index:100; background:var(--cream); border-bottom:1.5px solid #d6e8dc; box-shadow:0 2px 12px rgba(45,106,79,.07); }

    nav { max-width:1100px; margin:0 auto; padding:0 1.5rem; height:64px; display:flex; align-items:center; justify-content:space-between; }

    .logo { display:flex; align-items:center; gap:.5rem; text-decoration:none; }
    .logo-icon { width:34px; height:34px; background:var(--green); border-radius:9px; display:grid; place-items:center; font-size:1.1rem; }
    .logo-text { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--dark); }
    .logo-text span { color:var(--green); }

    .nav-links { display:flex; align-items:center; gap:2rem; list-style:none; }
    .nav-links a { text-decoration:none; font-size:.93rem; color:var(--text); position:relative; padding-bottom:2px; transition:color .2s; }
    .nav-links a::after { content:''; position:absolute; bottom:0; left:0; width:0; height:2px; background:var(--lime); border-radius:2px; transition:width .25s; }
    .nav-links a:hover { color:var(--green); }
    .nav-links a:hover::after { width:100%; }

    .btn { padding:.42rem 1rem; border-radius:8px; font-size:.9rem; transition:all .2s; }
    .btn-outline { border:1.5px solid var(--green); color:var(--green) !important; }
    .btn-outline:hover { background:var(--green); color:#fff !important; }
    .btn-solid { background:var(--green); color:#fff !important; border:1.5px solid var(--green); }
    .btn-solid:hover { background:var(--dark); border-color:var(--dark); }
    .btn::after { display:none !important; }

    .hamburger { display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:4px; }
    .hamburger span { display:block; width:24px; height:2px; background:var(--dark); border-radius:2px; transition:transform .3s, opacity .3s; }

    .mobile-menu { display:none; flex-direction:column; padding:.8rem 1.5rem 1rem; border-top:1px solid #d6e8dc; }
    .mobile-menu a { padding:.55rem 0; font-size:.95rem; color:var(--text); text-decoration:none; border-bottom:1px solid #e8f0eb; transition:color .2s; }
    .mobile-menu a:last-child { border:none; }
    .mobile-menu a:hover { color:var(--green); }

    @media(max-width:640px) {
      .nav-links { display:none; }
      .hamburger { display:flex; }
      .mobile-menu.open { display:flex; }
      .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
      .hamburger.open span:nth-child(2) { opacity:0; }
      .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="/" class="logo">
      <div class="logo-icon">🌿</div>
      <span class="logo-text">Agrio<span>.ai</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Weather</a></li>
      <li><a href="#" class="btn btn-outline">Sign In</a></li>
      <li><a href="#" class="btn btn-solid">Sign Up</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Weather</a>
    <a href="#">Sign In</a>
    <a href="#">Sign Up</a>
  </div>
</header>
<script>
  const btn = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  btn.addEventListener('click', () => { btn.classList.toggle('open'); menu.classList.toggle('open'); });
</script>
</body>
</html>
